name: تشغيل المساعد
on: 
  workflow_dispatch:
    inputs:
      command:
        description: 'أمرك للمساعد'
        required: true
        default: 'قل مرحبا'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install axios dotenv
      - run: node assistant.js "${{ github.event.inputs.command }}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
